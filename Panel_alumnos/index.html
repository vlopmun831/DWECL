<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gestión de Alumnos - Vanesa López</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main class="container">

        <h1 class="main-title">Panel de Alumnos</h1>
        <section class="tables-wrapper">
            <div class="table-container" id="container-alumnos">
                <h2>Lista de Alumnos</h2>
                <table id="tabla-alumnos">
                    
                    <tbody></tbody>
                </table>
            </div>

            <div class="table-container" id="container-seleccionados">
                <h2>Seleccionados</h2>
                <table id="tabla-seleccionados">
                    
                    <tbody></tbody>
                </table>
            </div>
        </section>

        <footer class="actions">
            <button id="btn-nuevo" class="btn primary">Nuevo Alumno</button>
            <button id="btn-enviar" class="btn success">Enviar Selección</button>
        </footer>
    </main>

    <div id="modal-formulario" class="modal">
        <div class="modal-content">
            <h3>Nuevo Alumno</h3>
            <form id="form-alumno">
                <input type="text" id="nombre" placeholder="Nombre" required>
                <input type="text" id="apellidos" placeholder="Apellidos" required>
                <input type="number" id="edad" placeholder="Edad" required>
                <div class="modal-buttons">
                    <button type="button" id="btn-cancelar" class="btn">Cancelar</button>
                    <button type="submit" class="btn primary">Añadir</button>
                </div>
            </form>
        </div>
    </div>

    <script src="script.js"></script>

    
</body>
<footer class="autor">
        <p>Vanesa López Muñoz   ||   DWECL   ||   2º DAW</p>
    </footer>
</html>
