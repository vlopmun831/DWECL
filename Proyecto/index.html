<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clasificación Liga de Fútbol</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1> ⚽ Liga de Fútbol 2025-2026 ⚽</h1>
            <p >Clasificación y Resultados</p>
        </header>

        <main>
            
            <section>
                <h2>🏆🏆 Clasificación 🏆🏆</h2>

                <div class="contenedor-tabla">
                    <table>
                        <thead>
                            <tr>
                                <th>Posición</th>
                                <th>Nombre</th>
                                <th>Puntos</th>
                                <th>Partidos Jugados</th>
                                <th>Partidos Ganados</th>
                                <th>Partidos Empatados</th>
                                <th>Partidos Perdidos</th>
                                <th>Goles a Favor</th>
                                <th>Goles en Contra</th>
                            </tr>
                        </thead>
                        <tbody id="cuerpoTabla">
                            <!-- Aquí se llena la tabla directamente con TypeScript -->
                        </tbody>
                    </table>
                </div>
            </section>

            <section>
                <h2>📝📝 Registrar Resultado 📝📝</h2>
                <form id="formularioResultado">
                    <div class="select-equipo" >
                        <label for="equipoLocal">Equipo Local:</label>
                        <select id="equipoLocal" name="equipoLocal" >
                            <option value="">-- Selecciona equipo local --</option>
                        </select>
                    </div>

                    <div class="form-group goles-container">
                        <div class="goles-input">
                            <label for="golesLocal">Goles Local:</label>
                            <input type="number" id="golesLocal" name="golesLocal" >
                        </div>
                        
                        <span class="vs">VS</span>
                        
                        <div class="goles-input">
                            <label for="golesVisitante">Goles Visitante:</label>
                            <input type="number" id="golesVisitante" name="golesVisitante" >
                        </div>
                    </div>

                    <div class="select-equipo">
                        <label for="equipoVisitante">Equipo Visitante:</label>
                        <select id="equipoVisitante" name="equipoVisitante" >
                            <option value="">-- Selecciona equipo visitante --</option>
                        </select>
                    </div>

                    <div id="mensajeError" class="error-message"></div>

                </form>
                 <button type="submit" class="btn-submit" onclick="procesarFormulario()"> ⚡ Registrar Resultado ⚡ </button>

            </section>

        </main>

        <footer>
            <p>Desarrollo Web Entorno Cliente -Vanesa López- 2º DAW </p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
